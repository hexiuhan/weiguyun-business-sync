<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>微谷云商务 v23</title>
<style>
:root{
  --g:#07C160;--gd:#06AD56;--gl:#E8F8EF;--r:#FA5151;--y:#FFC300;--b:#1989FA;
  --bg:#F5F6FA;--card:#fff;--tx:#1A1A2E;--t2:#6C7293;--t3:#B2BEC3;
  --br:#E8E8E8;--sh:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 12px rgba(0,0,0,.1);
  --rds:10px;--rds2:6px;--safe:env(safe-area-inset-bottom,12px);
  --ph0:#E84393;--ph1:#6C5CE7;--ph2:#0984E3;--ph3:#00B894;
  --ph4:#FD79A8;--ph5:#F39C12;--ph6:#00CEC9;--ph7:#636E72;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent}
input,select,textarea,button{font-family:inherit;font-size:inherit}
a{color:var(--g);text-decoration:none}

/* Login */
.login-wrap{position:fixed;inset:0;background:linear-gradient(160deg,#1AAD5A,#07C160,#06AD56);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
.login-card{background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 16px 60px rgba(0,0,0,.25);text-align:center}
.login-card .logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#07C160,#1AAD5A);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;box-shadow:0 8px 24px rgba(7,193,96,.3)}
.login-card h2{font-size:24px;font-weight:800;margin-bottom:4px;color:var(--tx);letter-spacing:-.5px}
.login-card .sub{font-size:13px;color:var(--t2);margin-bottom:28px;font-weight:400}
.login-input{width:100%;border:2px solid #E8ECF0;border-radius:12px;padding:14px 16px;font-size:15px;outline:none;margin-bottom:12px;transition:all .2s;background:#F8FAFB}
.login-input:focus{border-color:var(--g);background:#fff;box-shadow:0 0 0 4px rgba(7,193,96,.08)}
.login-input::placeholder{color:#B2BEC3}
.login-error{color:var(--r);font-size:12px;margin-bottom:4px;min-height:18px;font-weight:500}
.login-btn{width:100%;border:0;background:linear-gradient(135deg,#07C160,#1AAD5A);color:#fff;padding:15px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;box-shadow:0 4px 16px rgba(7,193,96,.25)}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(7,193,96,.35)}
.login-hint{font-size:11px;color:#B2BEC3;margin-top:16px;line-height:1.7}

/* App Layout */
.app-wrap{display:none;min-height:100vh;padding-bottom:70px}
.app-wrap.active{display:block}
/* Header */
.app-hd{background:var(--g);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.app-hd h1{font-size:16px;font-weight:700}
.app-hd .role-badge{font-size:11px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px}
.app-hd .hd-actions{display:flex;gap:8px;align-items:center}
.app-hd .hd-btn{background:rgba(255,255,255,.2);border:0;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.pc-sidebar{display:none}

/* Bottom Tab */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid var(--br);z-index:100;padding-bottom:var(--safe);box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 4px;cursor:pointer;color:var(--t3);transition:color .15s;font-size:10px;border:0;background:none}
.tab-item .ti{font-size:22px;margin-bottom:2px}
.tab-item.on{color:var(--g);font-weight:600}

/* Main Content */
.main-content{padding:12px}

/* Stats Cards */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--rds);padding:14px;box-shadow:var(--sh)}
.stat-card .sv{font-size:26px;font-weight:800;line-height:1.2}
.stat-card .sl{font-size:11px;color:var(--t2);margin-top:2px}
.stat-card .st{font-size:10px;font-weight:600;margin-top:4px}
.stat-card .st.up{color:var(--g)}.stat-card .st.down{color:var(--r)}
.stat-card.full{grid-column:1/-1}

/* Section */
.section{margin-bottom:14px}
.section-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.section-title .more{font-size:12px;color:var(--g);font-weight:500}

/* Quick Actions */
.quick-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.qa-item{background:var(--card);border-radius:var(--rds);padding:16px 8px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:all .15s;border:0;font-family:inherit}
.qa-item:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.qa-item .qai{font-size:32px;display:block;margin-bottom:4px}
.qa-item .qan{font-size:12px;font-weight:600;color:var(--tx)}

/* Contract List */
.ct-list{display:flex;flex-direction:column;gap:8px}
.ct-card{background:var(--card);border-radius:var(--rds);padding:14px;box-shadow:var(--sh);cursor:pointer;transition:all .15s;border-left:4px solid transparent}
.ct-card:hover{transform:translateY(-1px);box-shadow:var(--sh2)}
.ct-card.p0{border-left-color:var(--ph0)}.ct-card.p1{border-left-color:var(--ph1)}
.ct-card.p2{border-left-color:var(--ph2)}.ct-card.p3{border-left-color:var(--ph3)}
.ct-card.p4{border-left-color:var(--ph4)}.ct-card.p5{border-left-color:var(--ph5)}
.ct-card.p6{border-left-color:var(--ph6)}.ct-card.p7{border-left-color:var(--ph7)}
.ct-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ct-brand{font-weight:700;font-size:15px}
.ct-money{font-weight:700;color:var(--r);font-size:14px}
.ct-mid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;font-size:11px;color:var(--t2)}
.ct-mid span{background:#F5F6FA;padding:2px 8px;border-radius:10px}
.ct-bot{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.ct-phase{font-weight:600;padding:2px 8px;border-radius:10px;font-size:10px}
.ct-phase.p0{background:#FFF0F7;color:var(--ph0)}.ct-phase.p1{background:#F3F0FF;color:var(--ph1)}
.ct-phase.p2{background:#F0F7FF;color:var(--ph2)}.ct-phase.p3{background:#F0FDF8;color:var(--ph3)}
.ct-phase.p4{background:#FFF0F6;color:var(--ph4)}.ct-phase.p5{background:#FFF9E6;color:var(--ph5)}
.ct-phase.p6{background:#E0FFFA;color:var(--ph6)}.ct-phase.p7{background:#F1F3F4;color:var(--ph7)}
.ct-action{color:var(--b);font-weight:600}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--br);background:#fff;font-size:12px;white-space:nowrap;cursor:pointer;color:var(--t2);transition:all .15s}
.filter-chip.on{background:var(--g);color:#fff;border-color:var(--g)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
@media(min-width:768px){.modal-overlay{align-items:center}}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
@media(min-width:768px){.modal{border-radius:16px;max-height:85vh}}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-close{border:0;background:#f5f6fa;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2)}
.modal-bd{padding:16px 18px}
.modal-ft{padding:12px 18px;border-top:1px solid var(--br);display:flex;gap:8px;justify-content:flex-end}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-item{display:flex;flex-direction:column}
.form-item.full{grid-column:1/-1}
.form-label{font-size:12px;color:var(--t2);margin-bottom:4px;font-weight:500}
.form-label .req{color:var(--r)}
.form-input,.form-select{border:1px solid var(--br);border-radius:var(--rds2);padding:10px 12px;font-size:14px;outline:none;width:100%;background:#fff}
.form-input:focus,.form-select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(7,193,96,.08)}
textarea.form-input{resize:vertical;min-height:60px}
.form-input:disabled{background:#f5f6fa;color:var(--t2)}

/* Talent rows in form */
.talent-rows{margin-top:6px}
.talent-row{background:#f8f9fa;border-radius:var(--rds2);padding:12px;margin-bottom:8px;position:relative}
.talent-row-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.talent-row-hd span{font-size:13px;font-weight:700}
.del-talent{border:0;background:#f8d7da;color:#721c24;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px}
.talent-row-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.talent-row-grid .tr-full{grid-column:1/-1}
.talent-label{font-size:10px;color:var(--t2);margin-bottom:2px}
.talent-input,.talent-select{border:1px solid var(--br);border-radius:4px;padding:7px 8px;font-size:12px;outline:none;width:100%;background:#fff}
.talent-input:focus,.talent-select:focus{border-color:var(--g)}
textarea.talent-input{resize:vertical;min-height:40px}
.add-talent-btn{border:1px dashed var(--g);background:var(--gl);color:var(--g);padding:10px;border-radius:var(--rds2);cursor:pointer;font-size:13px;font-weight:600;width:100%;text-align:center;margin-top:4px}

/* Buttons */
.btn{border:0;padding:10px 20px;border-radius:var(--rds2);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-green{background:var(--g);color:#fff}.btn-green:hover{background:var(--gd)}
.btn-white{background:#fff;border:1px solid var(--br);color:var(--tx)}.btn-white:hover{background:#f5f6fa}
.btn-red{background:var(--r);color:#fff}.btn-red:hover{opacity:.9}
.btn-blue{background:var(--b);color:#fff}.btn-blue:hover{opacity:.9}
.btn-block{width:100%;justify-content:center}
.btn-sm{padding:6px 12px;font-size:12px}

/* Detail */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.detail-item{background:#f8f9fa;border-radius:var(--rds2);padding:8px 10px}
.detail-label{font-size:10px;color:var(--t2)}
.detail-value{font-size:13px;font-weight:600;margin-top:2px}
.detail-value.money{color:var(--r)}
/* Phase stepper */
.phase-stepper{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0}
.ph-step{padding:6px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--br);background:#fff;color:var(--t2)}
.ph-step.active{border-color:var(--g);background:var(--gl);color:var(--g)}
.ph-step.done{background:#E8F8EF;border-color:#07C16040;color:var(--g)}
/* Talent detail blocks */
.talent-block{background:#f8f9fa;border-radius:var(--rds2);padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--b)}
.talent-block .tb-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.talent-block .tb-name{font-weight:700;font-size:14px}
.talent-block .tb-fee{color:var(--r);font-weight:700}
.talent-block .tb-row{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;margin-top:3px}
.talent-block .tb-row span{background:#fff;padding:2px 8px;border-radius:10px;color:var(--t2);font-weight:500}

/* Check-in */
.checkin-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.checkin-item{background:#f8f9fa;border-radius:var(--rds2);padding:8px 10px;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.checkin-item .ci-date{font-weight:600;color:var(--tx)}
.checkin-item .ci-content{color:var(--t2)}
.checkin-item .ci-gmv{color:var(--r);font-weight:600}

/* Todo */
.todo-list{display:flex;flex-direction:column;gap:8px}
.todo-item{background:var(--card);border-radius:var(--rds);padding:14px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;cursor:pointer;border-left:4px solid transparent}
.todo-item.urgent{border-left-color:var(--r);background:#FFF5F5}
.todo-item.warn{border-left-color:var(--y);background:#FFFDEB}
.todo-item.normal{border-left-color:var(--b)}
.todo-item .todo-icon{font-size:28px;flex-shrink:0}
.todo-item .todo-info{flex:1;min-width:0}
.todo-item .todo-title{font-size:14px;font-weight:600}
.todo-item .todo-desc{font-size:11px;color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.todo-item .todo-urgent{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;flex-shrink:0}
.todo-item .todo-urgent.u{background:#FFF0F0;color:var(--r)}
.todo-item .todo-urgent.w{background:#FFF8E0;color:#B8860B}
.todo-item .todo-urgent.n{background:#F0F7FF;color:var(--b)}
.todo-item .todo-arrow{color:var(--t3);font-size:18px;flex-shrink:0}

/* Dashboard */
.dash-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.dash-kpi{background:var(--card);border-radius:var(--rds);padding:16px;box-shadow:var(--sh);text-align:center}
.dash-kpi .dk-num{font-size:30px;font-weight:800}
.dash-kpi .dk-label{font-size:11px;color:var(--t2);margin-top:2px}
.dash-kpi.full{grid-column:1/-1}
.dash-chart{background:var(--card);border-radius:var(--rds);padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.dash-chart h4{font-size:13px;font-weight:700;margin-bottom:10px}
/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--t2);width:60px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:20px;background:#f0f2f5;border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px;transition:width .5s;min-width:4px}
.bar-count{font-size:11px;font-weight:700;width:24px;text-align:left;flex-shrink:0}
/* Table mini */
.mini-table{width:100%;font-size:11px;border-collapse:collapse}
.mini-table th{text-align:left;padding:6px 8px;color:var(--t2);font-weight:600;border-bottom:2px solid var(--br);background:#f8f9fa}
.mini-table td{padding:6px 8px;border-bottom:1px solid var(--br)}
.mini-table .right{text-align:right}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty .ei{font-size:48px;display:block;margin-bottom:8px}
.empty .et{font-size:14px;font-weight:600;color:var(--t2)}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* PC layout */
@media(min-width:768px){
  .app-wrap{padding-bottom:0;max-width:1200px;margin:0 auto}
  .app-hd{border-radius:var(--rds);margin:10px;position:relative}
  .tab-bar{position:static;border-radius:0 0 var(--rds) var(--rds);margin:0 10px 10px;box-shadow:none}
  .main-content{padding:10px}
  .stats-row{grid-template-columns:repeat(4,1fr)}
  .dash-kpis{grid-template-columns:repeat(4,1fr)}
  .grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid{grid-template-columns:1fr 1fr 1fr}
  .quick-actions{grid-template-columns:repeat(6,1fr)}
  .detail-grid{grid-template-columns:1fr 1fr 1fr}
}

/* Alert */
.alert{background:#FFF3CD;border:1px solid #FFC107;border-radius:var(--rds2);padding:10px 14px;font-size:12px;color:#856404;margin-bottom:10px}
.alert-info{background:#F0F7FF;border-color:#1989FA40;color:#004085}

/* Progress bar */
.pbar-w{width:100%;margin:2px 0}
.pbar{background:#f0f2f5;border-radius:4px;height:6px;overflow:hidden;display:inline-block;width:calc(100% - 40px);vertical-align:middle}
.pfill{height:100%;border-radius:4px;transition:width .4s}
.pfill.act{background:var(--g)}
.pfill.done{background:var(--b)}
.ptxt{font-size:10px;color:var(--t2);margin-left:4px;vertical-align:middle}

/* Risk indicators on contract cards */
.ct-card.risk-r{border-left-color:var(--r)!important;background:#FFF5F5}
.ct-card.risk-y{border-left-color:var(--y)!important;background:#FFFDEB}
.ct-card.risk-n{border-left-color:var(--b)!important}
.ct-risk{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-left:6px}
.ct-risk.r{background:#FFF0F0;color:var(--r)}
.ct-risk.y{background:#FFF8E0;color:#B8860B}
.ct-risk.n{background:#F0F7FF;color:var(--b)}

/* Payment records */
.payment-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.payment-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f8f9fa;border-radius:var(--rds2);font-size:12px;border-left:3px solid var(--g)}
.payment-item .pay-amount{font-weight:700;color:var(--g)}
.payment-total{display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid var(--br);margin-top:8px;font-weight:700}

/* Image thumbnails */
.img-thumb{max-width:100px;max-height:60px;border-radius:4px;cursor:pointer;border:1px solid var(--br)}
.img-full{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-full img{max-width:90vw;max-height:90vh;border-radius:8px}
.upload-area{border:2px dashed var(--br);border-radius:var(--rds2);padding:20px;text-align:center;cursor:pointer;transition:all .2s;color:var(--t2);font-size:12px}
.upload-area:hover{border-color:var(--g);background:var(--gl)}
/* Import selection */
tr.selected{background:#E8F8EF!important}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
<div class="login-card">
<div class="logo">WG</div>
<h2>微谷云商务</h2>
<div class="sub">商务全流程管理系统</div>
<input class="login-input" id="loginName" placeholder="请输入姓名" autocomplete="username">
<input class="login-input" type="text" id="loginPwd" placeholder="请输入6位数字密码" autocomplete="current-password">
<div class="login-error" id="loginError"></div>
<button class="login-btn" onclick="doLogin()">登 录</button>
<div class="login-hint">仅限已注册用户 · 联系管理员开通账号</div>
</div>
</div>

<!-- App -->
<div class="app-wrap" id="appWrap">

<!-- Header -->
<div class="app-hd">
<h1 id="hdTitle">📊 微谷云商务</h1>
<div class="hd-actions">
<span class="role-badge" id="roleBadge"></span>
<button class="hd-btn" onclick="openChangePwd()" title="修改密码">🔑</button>
<button class="hd-btn" onclick="doLogout()" title="退出">↩</button>
</div>
</div>

<!-- Main Content -->
<div class="main-content" id="mainContent"></div>

<!-- Bottom Tab -->
<nav class="tab-bar" id="tabBar">
<button class="tab-item on" data-tab="home"><span class="ti">🏠</span>首页</button>
<button class="tab-item" data-tab="contracts"><span class="ti">📋</span>合同</button>
<button class="tab-item" data-tab="todos"><span class="ti">📌</span>待办</button>
<button class="tab-item" data-tab="dashboard"><span class="ti">📈</span>看板</button>
</nav>
</div>

<!-- Modal -->

// Merge cloud into local store: keep local-only records, resolve same-id conflicts by recency.
// Payments live INSIDE each contract (c.payments) and are carried along with the contract merge.
function mergeCloudInto(local, cloud){
  if(!cloud||!cloud.contracts)return local;
  const out=JSON.parse(JSON.stringify(local));
  const arr=['contracts','talents','checkins','brands','thirdParties'];
  arr.forEach(key=>{
    const lArr=out[key]||[]; const cArr=cloud[key]||[];
    const lMap=new Map(lArr.map(x=>[x.id,x]));
    const cMap=new Map(cArr.map(x=>[x.id,x]));
    const merged=[];
    lArr.forEach(x=>{ if(!cMap.has(x.id)) merged.push(x); }); // local-only kept
    cArr.forEach(x=>{
      const lx=lMap.get(x.id);
      if(!lx){ merged.push(x); }              // cloud-only added
      else {
        const lt=lx.updatedAt||'', ct=x.updatedAt||'';
        merged.push(ct>lt?x:lx);              // newer wins
      }
    });
    out[key]=merged;
  });
  return out;
}

// Stable signature to detect REAL changes (avoids spurious re-render from key reordering)
function storeSig(s){
  const a=['contracts','talents','checkins','brands','thirdParties'];
  const counts=a.map(k=>(s[k]||[]).length).join(',');
  const ids=(s.contracts||[]).map(c=>c.id+':'+c.phase+':'+(c.payments||[]).length).join('|');
  return counts+'#'+ids;
}

// Cache-busted pull from GitHub + merge into `into`. Always returns a store (merged or original).
async function pullLatest(into){
  try{
    const r=await fetch(GH_RAW+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok)return into;
    const d=await r.json();
    if(d&&d.contracts){ return mergeCloudInto(into,d); }
  }catch(e){}
  return into;
}

// READ-MODIFY-WRITE: pull latest, merge, then push the merged result so we never clobber
// data created on another device.
async function pushToGitHub(s){
  if(!GH_TOKEN){ markSynced('未设Token·仅本地保存'); return; }
  try{
    const merged=await pullLatest(JSON.parse(JSON.stringify(s)));
    store=merged;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
    const exportTime=new Date().toISOString();
    const g=await fetch(GH_API,{headers:{Authorization:'token '+GH_TOKEN}});
    const gd=await g.json();
    const data={exportTime,contracts:merged.contracts,talents:merged.talents,checkins:merged.checkins,brands:merged.brands,thirdParties:merged.thirdParties};
    const body={message:'sync: '+exportTime.split('T')[0],content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),branch:'main'};
    if(gd.sha)body.sha=gd.sha;
    const res=await fetch(GH_API,{method:'PUT',headers:{Authorization:'token '+GH_TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(res.ok){ setLastSync(exportTime); markSynced('已推送 '+exportTime.slice(11,19)); }
  }catch(e){}
}

// Pull cloud and merge. Returns true only if data actually changed.
async function loadFromCloud(force){
  try{
    const before=storeSig(store);
    store=await pullLatest(store);
    localStorage.setItem(STORAGE_KEY,JSON.stringify(store));
    const after=storeSig(store);
    if(after!==before){ markSynced('已拉取 '+new Date().toISOString().slice(11,19)); return true; }
    return false;
  }catch(e){}
  return false;
}

function renderContractCard(c){
  const totalFee=c.talents.reduce((s,t)=>s+(t.fee||0),0);
  // Risk calculation
  const now=new Date();
  const due=new Date(c.dueDate);
  const daysLeft=Math.ceil((due-now)/(86400000));
  let risk='n',riskLabel='正常';
  if(c.phase>=7){risk='n';riskLabel='已归档'}
  else if(daysLeft<=0){risk='r';riskLabel='超期'}
  else if(daysLeft<=14){risk='y';riskLabel='临近到期'}
  else if(daysLeft<=30){risk='n';riskLabel='正常'}
  return `
  <div class="ct-card ${PHASE_COLORS[c.phase]} risk-${risk}" onclick="openContractDetail('${c.id}')">
    <div class="ct-top">
      <div>
        <div class="ct-brand">${c.brandName}<span class="ct-risk ${risk}">${riskLabel}</span></div>
        <div style="font-size:11px;color:var(--t2)">${c.contractName}</div>
      </div>
      <div class="ct-money">¥${fmt(c.amount)}</div>
    </div>
    <div class="ct-mid">
      <span>${c.signDate} ~ ${c.dueDate}</span>
      <span>${c.talents.length}位达人</span>
      ${totalFee?`<span>达人费 ¥${fmt(totalFee)}</span>`:''}
      ${c.paidAmount?`<span style="color:var(--g)">已回¥${fmt(c.paidAmount)}</span>`:''}
    </div>
    <div class="ct-bot">
      ${phaseTag(c.phase)}
      <span class="ct-action">${ACTIONS[c.nextAction]||''} →</span>
    </div>
  </div>`;
}

function filterContracts(btn,type){
  btn.parentElement.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  let list=[...store.contracts];
  list.sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt));
  if(type==='active')list=list.filter(c=>c.phase<7);
  else if(type==='done')list=list.filter(c=>c.phase===7);
  else if(type==='mine'){
    if(currentRole==='director'||currentRole==='flow_director')list=list.filter(c=>c.nextAction<=2);
    else if(currentRole==='assistant')list=list.filter(c=>c.phase>=2&&c.phase<=4);
    else if(currentRole==='talent')list=list.filter(c=>c.talents.some(t=>t.name===currentUser||currentUser.includes(t.name)||t.name.includes(currentUser)));
    else if(currentRole==='finance')list=list;
  } else if(type==='all'){
    // "全部" also respects role: talent only sees their own
    if(currentRole==='talent')list=list.filter(c=>c.talents.some(t=>t.name===currentUser||currentUser.includes(t.name)||t.name.includes(currentUser)));
  }
  document.getElementById('contractList').innerHTML=list.map(c=>renderContractCard(c)).join('')||'<div class="empty"><span class="ei">📭</span><span class="et">没有匹配的合同</span></div>';
}

function saveContract(){
  const m=document.getElementById('modalBox');
  const get=(s)=>m.querySelector(s)?.value||'';
  const brand=get('.brand');const cname=get('.cname');const amount=parseFloat(get('.amount'))||0;
  const signDate=get('.signDate');const dueDate=get('.dueDate');
  const attachment=get('.attachment');
  const thirdPartyRebate=get('.tpRebate');
  const splitPlan=get('.splitPlan');
  const platformRebate=get('.platformRebate');
  const contractId=get('.contractId');
  if(!brand||!cname||!amount||!signDate||!dueDate){toast('请填写必填字段');return}

  const talents=[];
  m.querySelectorAll('.talent-row').forEach(row=>{
    const n=row.querySelector('.t-name')?.value||'';
    if(n&&n!=='__custom__')talents.push({
      name:n,
      fee:parseFloat(row.querySelector('.t-fee')?.value)||0,
      rebateRate:row.querySelector('.t-rebate')?.value||'',
      startDate:row.querySelector('.t-start')?.value||'',
      endDate:row.querySelector('.t-end')?.value||'',
      thirdParty:row.querySelector('.t-third')?.value||'',
      remark:row.querySelector('.t-remark')?.value||''
    });
  });

  if(contractId){
    const idx=store.contracts.findIndex(c=>c.id===contractId);
    if(idx>=0){
      store.contracts[idx].brandName=brand;store.contracts[idx].contractName=cname;
      store.contracts[idx].amount=amount;store.contracts[idx].signDate=signDate;
      store.contracts[idx].dueDate=dueDate;store.contracts[idx].attachment=attachment;
      store.contracts[idx].thirdPartyRebate=thirdPartyRebate;store.contracts[idx].splitPlan=splitPlan;
      store.contracts[idx].platformRebate=platformRebate;store.contracts[idx].talents=talents;
      store.contracts[idx].updatedAt=new Date().toISOString().split('T')[0];
      addAuditLog('编辑合同',brand+' '+cname,`金额:${amount} 达人:${talents.map(t=>t.name).join(',')}`);
    }
  }else{
    const nc={
      id:genId('C'),brandName:brand,contractName:cname,amount,signDate,dueDate,
      attachment,thirdPartyRebate,splitPlan,platformRebate,
      phase:0,nextAction:0,talents,createdAt:new Date().toISOString().split('T')[0],
      updatedAt:new Date().toISOString().split('T')[0]
    };
    store.contracts.push(nc);
    addAuditLog('创建合同',brand+' '+cname,`金额:${amount} 达人:${talents.map(t=>t.name).join(',')}`);
  }
  saveStore(store);
  closeModal();
  renderTab(currentTab);
  toast(contractId?'合同已更新':'合同已创建');
}

    toast('无权限查看此合同');

function advancePhase(id){
  const c=store.contracts.find(x=>x.id===id);
  if(!c)return;

  // flow_director: view only
  if(currentRole==='flow_director'){toast('流程总监仅可查看，不可操作');return;}

  // Check if talent has checked in before phase 3→4
  if(c.phase===3){
    const talentCheckins=store.checkins.filter(ci=>ci.contractId===id);
    if(!talentCheckins.length){toast('❌ 达人尚未打卡，请先完成打卡再推进');return}
    // Check if all assigned talents have checked in
    const assigned=(c.talents||[]).map(t=>t.name);
    const done=assigned.filter(n=>talentCheckins.some(ci=>ci.talentName===n));
    if(done.length<assigned.length){
      const missing=assigned.filter(n=>!done.includes(n)).join('、');
      toast(`❌ 以下达人尚未打卡：${missing}`);
      return;
    }
  }

  // Rule: all assigned talents must have checked in before archiving (phase 6→7)
  if(c.phase===6){
    const assigned=(c.talents||[]).map(t=>t.name);
    const chk=store.checkins.filter(ci=>ci.contractId===id);
    const done=assigned.filter(n=>chk.some(ci=>ci.talentName===n));
    if(assigned.length&&done.length<assigned.length){
      const missing=assigned.filter(n=>!done.includes(n)).join('、');
      toast(`❌ 达人必须打卡才能归档！以下达人尚未打卡：${missing}`);
      return;
    }
  }

  // Check full payment before archiving (phase 6→7)
  if(c.phase===6){
    const paid=c.paidAmount||0;
    const total=c.amount||0;
    if(paid<total){
      const remaining=total-paid;
      toast(`❌ 合同尚未全额回款！已回¥${fmt(paid)} / 总额¥${fmt(total)}，还差¥${fmt(remaining)}`);
      return;
    }
  }

  // Check if current role already confirmed this phase
  if(!c.phaseConfirmers)c.phaseConfirmers={};
  const phaseKey='phase'+c.phase;
  const roleKey=currentRole+'_'+currentUser;
  if(c.phaseConfirmers[phaseKey]===roleKey){
    toast('⚠️ 你已确认过此阶段，请等待下一个角色确认');
    return;
  }
  c.phaseConfirmers[phaseKey]=roleKey;

  c.phase=Math.min(c.phase+1,7);
  c.nextAction=Math.min(c.nextAction+1,7);
  c.updatedAt=new Date().toISOString().split('T')[0];
  saveStore(store);
  closeModal();
  openContractDetail(id);
  addAuditLog('推进阶段',c.brandName+' '+c.contractName,`→${PHASES[c.phase]}`);
  toast(`✅ 已确认推进到：${PHASES[c.phase]}`);
}

一、合作内容
${c.contractName}

合同总金额：¥${fmt(c.amount)}（人民币）

${talentText}

${c.signDate} 至 ${c.dueDate}

六、付款方式
按月度执行，品牌方验收后支付当月费用。

  const modal=document.getElementById('modalBox');
  modal.innerHTML=`

function deleteContract(id){
  if(!confirm('确定删除该合同？可在回收站恢复！'))return;
  const c=store.contracts.find(x=>x.id===id);
  if(!c)return;
  moveToTrash('contract',JSON.parse(JSON.stringify(c)));
  store.contracts=store.contracts.filter(c=>c.id!==id);
  store.checkins=store.checkins.filter(c=>c.contractId!==id);
  saveStore(store);
  closeModal();
  renderTab(currentTab);
  addAuditLog('删除合同',c.brandName+' '+c.contractName,'已移至回收站');
  toast('合同已移至回收站（可恢复）');
}

function importExcel(){
  if(typeof XLSX==='undefined'){toast('Excel解析库加载中，请刷新后重试');return}
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.xlsx,.xls,.csv';
  inp.onchange=function(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=new Uint8Array(ev.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        if(!rows.length){toast('文件为空');return}
        const header=rows[0].map(h=>String(h||'').trim());
        // Map column indices
        const colMap={};
        header.forEach((h,i)=>{
          const l=h.toLowerCase();
          if(l.includes('品牌'))colMap.brand=i;
          if(l.includes('合同')&&l.includes('名'))colMap.contractName=i;
          if(l.includes('金额')||l.includes('费用')||l.includes('预算'))colMap.amount=i;
          if(l.includes('签约')||l.includes('开始'))colMap.signDate=i;
          if(l.includes('到期')||l.includes('结束'))colMap.dueDate=i;
          if(l.includes('达人'))colMap.talent=i;
          if(l.includes('达人费')||l.includes('费用'))colMap.talentFee=i;
          if(l.includes('返利')||l.includes('扣点'))colMap.rebate=i;
          if(l.includes('第三方'))colMap.thirdParty=i;
          if(l.includes('分配'))colMap.splitPlan=i;
          if(l.includes('平台'))colMap.platformRebate=i;
          if(l.includes('备注')||l.includes('说明'))colMap.remark=i;
        });
        // If no brand column found, try to auto-detect
        if(colMap.brand===undefined)colMap.brand=0;
        if(colMap.contractName===undefined)colMap.contractName=1;
        if(colMap.amount===undefined)colMap.amount=2;

        const preview=[];
        for(let r=1;r<Math.min(rows.length,21);r++){
          const row=rows[r];
          if(!row||!row.some(c=>c))continue;
          const brand=String(row[colMap.brand]||'').trim();
          const cname=String(row[colMap.contractName]||'').trim();
          const amount=parseFloat(String(row[colMap.amount]||'').replace(/[,，¥\s]/g,''))||0;
          if(!brand&&!cname)continue;
          const talent=colMap.talent!==undefined?String(row[colMap.talent]||'').trim():'';
          const talentFee=colMap.talentFee!==undefined?parseFloat(String(row[colMap.talentFee]||'').replace(/[,，¥\s]/g,''))||0:0;
          const rebate=colMap.rebate!==undefined?String(row[colMap.rebate]||'').trim():'';
          const thirdParty=colMap.thirdParty!==undefined?String(row[colMap.thirdParty]||'').trim():'';
          const splitPlan=colMap.splitPlan!==undefined?String(row[colMap.splitPlan]||'').trim():'';
          const platformRebate=colMap.platformRebate!==undefined?String(row[colMap.platformRebate]||'').trim():'';
          const remark=colMap.remark!==undefined?String(row[colMap.remark]||'').trim():'';
          const signDate=colMap.signDate!==undefined?formatExcelDate(row[colMap.signDate]):'';
          const dueDate=colMap.dueDate!==undefined?formatExcelDate(row[colMap.dueDate]):'';
          preview.push({brand,cname,amount:amount||null,signDate,dueDate,talent,talentFee,rebate,thirdParty,splitPlan,platformRebate,remark});
        }
        if(!preview.length){toast('未识别到数据行');return}
        showImportPreview(preview,header);
      }catch(e){toast('解析失败：'+e.message)}
    };
    reader.readAsArrayBuffer(file);
  };
  inp.click();
}

function formatExcelDate(v){
  if(!v)return'';
  // Handle Excel serial date number
  if(typeof v==='number'&&v>40000&&v<100000){
    const d=new Date((v-25569)*86400000);
    return d.toISOString().split('T')[0];
  }
  const s=String(v).trim();
  // Try common date formats
  const m=s.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
  if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return s;
}

function doImportExcel(){
  const data=window._importData;
  if(!data||!data.length)return;
  const trs=document.querySelectorAll('#modalBox tr.selected');
  let imported=0;
  trs.forEach(tr=>{
    const idx=parseInt(tr.id.replace('imp_r',''));
    if(isNaN(idx))return;
    const p=data[idx];
    if(!p.brand||!p.cname)return;
    const talents=[];
    if(p.talent&&p.talentFee)talents.push({name:p.talent,fee:p.talentFee,startDate:p.signDate,endDate:p.dueDate,rebateRate:p.rebate||'',thirdParty:p.thirdParty||'',remark:p.remark||''});
    store.contracts.push({
      id:genId('C'),brandName:p.brand,contractName:p.cname,amount:p.amount||0,
      signDate:p.signDate||new Date().toISOString().split('T')[0],
      dueDate:p.dueDate||'',
      thirdPartyRebate:p.rebate||'',splitPlan:p.splitPlan||'',platformRebate:p.platformRebate||'',
      phase:0,nextAction:0,talents,
      createdAt:new Date().toISOString().split('T')[0],
      updatedAt:new Date().toISOString().split('T')[0],
      remark:p.remark||''
    });
    imported++;
  });
  saveStore(store);
  closeModal();
  renderTab(currentTab);
  addAuditLog('导入合同','Excel批量',`${imported}条`);
  toast(`成功导入 ${imported} 条合同`);

  // Add talents from imported rows only
  trs.forEach(tr=>{
    const idx=parseInt(tr.id.replace('imp_r',''));
    if(isNaN(idx))return;
    const p=data[idx];
    if(p&&p.talent&&!store.talents.find(t=>t.name===p.talent)){
      store.talents.push({id:'T'+String(store.talents.length+1).padStart(3,'0'),name:p.talent,platform:'',fans:'',category:'',cooperation:0,remark:'Excel导入'});
    }
  });
  saveStore(store);
}

function addPayment(id){
  const c=store.contracts.find(x=>x.id===id);
  if(!c)return;
  const amount=parseFloat(document.getElementById('editPayAmount').value)||0;
  const date=document.getElementById('editPayDate').value;
  const note=document.getElementById('editPayNote').value||'';
  if(!amount||!date){toast('请填写回款金额和日期');return}
  // Rule: received income cannot exceed contract income
  const totalAmt=c.amount||0;
  const paidSoFar=(c.paidAmount||0);
  if(paidSoFar+amount>totalAmt){
    toast(`❌ 回款不能超过合同收入！合同总额¥${fmt(totalAmt)}，已回¥${fmt(paidSoFar)}，本次最多还能回¥${fmt(Math.max(0,totalAmt-paidSoFar))}`);
    return;
  }
  if(!c.payments)c.payments=[];

  const videoCount=parseInt(document.getElementById('ciVideoCount').value)||0;

// === Todos ===
function getMyTodos(){
  const todos=[];
  const today=new Date().toISOString().split('T')[0];

  store.contracts.forEach(c=>{
    const action=ACTIONS[c.nextAction];
    const dAgo=daysAgo(c.updatedAt);

    // Urgency: urgent(red) = 超期 or 待审批>3天, warn(yellow) = 即将到期 or 待处理>1天, normal(blue) = 常规
    function urgency(){
      if(c.phase===7)return'normal';
      if(action.includes('超期'))return'urgent';
      if(dAgo>7)return'urgent';
      if(action.includes('总监')&&dAgo>3)return'urgent';
      if(action.includes('总监')&&dAgo>1)return'warn';
      if(c.dueDate&&new Date(c.dueDate)<new Date()&&c.phase<7)return'urgent';
      if(dAgo>3)return'warn';
      return'normal';
    }

    if(currentRole==='director'){
      if(action.includes('总监')||c.phase<1)
        todos.push({type:'approve',c,action,urgency:urgency()});
    }
    if(currentRole==='assistant'){
      if(action.includes('达人')||action.includes('助理')||c.phase>=2&&c.phase<=4)
        todos.push({type:'exec',c,action,urgency:urgency()});
    }
    if(currentRole==='finance'){
      if(action.includes('财务')||c.phase>=5&&c.phase<=6)
        todos.push({type:'finance',c,action,urgency:urgency()});
    }
    if(currentRole==='talent'){
      const myTalents=c.talents.filter(t=>
        t.name.includes(currentUser)||currentUser.includes(t.name)
      );
      if(myTalents.length>0){
        if(c.phase===3)todos.push({type:'checkin',c,action:'今日打卡',urgency:'urgent'});
        if(c.phase===2)todos.push({type:'checkin',c,action:'等待执行',urgency:'warn'});
        if(c.phase>3&&c.phase<7)todos.push({type:'checkin',c,action:'已执行（查看）',urgency:'normal'});
      }
    }
  });

  // Pending checkin confirmations for assistant
  if(currentRole==='assistant'){
    const pending=store.checkins.filter(ci=>!ci.confirmedBy);
    pending.forEach(ci=>{
      const c=store.contracts.find(x=>x.id===ci.contractId);
      if(c){
        const dAgo=daysAgo(ci.date);
        todos.push({type:'confirm',c,action:`确认 ${ci.talentName} ${ci.date} 打卡`,ci,urgency:dAgo>3?'urgent':dAgo>1?'warn':'normal'});
      }
    });
  }

  // Sort: urgent first, then warn, then normal
  const urgencyOrder={urgent:0,warn:1,normal:2};
  todos.sort((a,b)=>urgencyOrder[a.urgency]-urgencyOrder[b.urgency]);
  return todos;
}

  const labelCls={urgent:'u',warn:'w',normal:'n'};
  const urgCount=todos.filter(t=>t.urgency==='urgent').length;
  const warnCount=todos.filter(t=>t.urgency==='warn').length;

  mc.innerHTML=`

        <span style="font-size:11px;font-weight:400">

    const todayChk=myCheckins.filter(c=>c.date===today);
    mc.innerHTML=`
      <div class="alert">🎯 ${currentUser} 的工作看板</div>
      <div class="dash-kpis">
        <div class="dash-kpi"><div class="dk-num" style="color:var(--b)">${myContracts.length}</div><div class="dk-label">我的合同</div></div>
        <div class="dash-kpi"><div class="dk-num" style="color:#FF9500">¥${fmt(myGMV)}</div><div class="dk-label">我的总GMV</div></div>
        <div class="dash-kpi"><div class="dk-num" style="color:var(--g)">${myCheckins.length}</div><div class="dk-label">打卡次数</div></div>
        <div class="dash-kpi"><div class="dk-num" style="color:${todayChk.length?'var(--g)':'var(--r)'}">${todayChk.length?'✓已打卡':'未打卡'}</div><div class="dk-label">今日状态</div></div>
      </div>
      <div class="dash-chart"><h4>📋 我的合同进度</h4>
        ${myContracts.map(c=>{
          const myTalent=c.talents.find(t=>t.name===currentUser||currentUser.includes(t.name));
          const chk=getTalentCheckins(myTalent?.name||currentUser,c.id);
          const start=new Date(myTalent?.startDate||c.signDate);
          const end=new Date(myTalent?.endDate||c.dueDate);
          const totalDays=Math.max(1,(end-start)/(86400000));
          const elapsed=Math.min(totalDays,Math.max(0,(new Date()-start)/(86400000)));
          const pct=Math.round(elapsed/totalDays*100);
          return `<div style="margin-bottom:12px" onclick="openContractDetail('${c.id}')" style="cursor:pointer">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <strong>${c.brandName} · ${c.contractName}</strong>
              <span style="color:var(--r);font-weight:700">¥${fmt(myTalent?.fee||0)}</span>
            </div>
            <div style="font-size:10px;color:var(--t2);margin-bottom:3px">
              ${myTalent?.startDate||''} ~ ${myTalent?.endDate||''} | 打卡${chk.length}次 | 状态：${PHASES[c.phase]}
            </div>
            <div class="pbar-w"><div class="pbar"><div class="pfill ${c.phase>=4?'done':pct>80?'done':'act'}" style="width:${pct}%"></div></div><span class="ptxt">${pct}%</span></div>
          </div>`;
        }).join('')||'<div class="empty"><span class="ei">📭</span><span class="et">暂无我的合同</span></div>'}
      </div>
      <div style="text-align:center;padding:10px"><button class="btn btn-blue btn-sm" onclick="exportData()">📥 导出我的数据</button></div>
    `;return;
  }

  if(currentRole==='assistant'){
    // Assistant: full pipeline view, focused on execution monitoring
    const pendingCheckins=store.checkins.filter(ci=>!ci.confirmedBy);
    const todayCheckins=store.checkins.filter(ci=>ci.date===new Date().toISOString().split('T')[0]);
    mc.innerHTML=`
      <div class="alert alert-info">💼 商务助理工作台 · 执行监控视角</div>
      <div class="dash-kpis">
        <div class="dash-kpi"><div class="dk-num" style="color:var(--b)">${store.contracts.length}</div><div class="dk-label">全盘合同</div></div>
        <div class="dash-kpi"><div class="dk-num" style="color:var(--r)">${pendingCheckins.length}</div><div class="dk-label">待确认打卡</div></div>
        <div class="dash-kpi"><div class="dk-num" style="color:var(--g)">${todayCheckins.length}</div><div class="dk-label">今日打卡</div></div>
        <div class="dash-kpi"><div class="dk-num">${store.contracts.filter(c=>c.phase>=2&&c.phase<=4).length}</div><div class="dk-label">执行中合同</div></div>
      </div>
      <div class="dash-chart"><h4>📊 合同阶段总览</h4>
        <div class="bar-chart">
          ${PHASES.map((p,i)=>`<div class="bar-row"><span class="bar-label">${p}</span><div class="bar-track"><div class="bar-fill" style="width:${(phaseCounts[i]/maxPhase*100)}%;background:var(--ph${i})"></div></div><span class="bar-count">${phaseCounts[i]}</span></div>`).join('')}
        </div>
      </div>
      ${pendingCheckins.length?`
      <div class="dash-chart"><h4>⏳ 待确认打卡 (${pendingCheckins.length})</h4>
        ${pendingCheckins.map(ci=>`<div class="checkin-item" style="cursor:pointer" onclick="confirmCheckin('${ci.id}')"><div><span class="ci-date">${ci.date}</span> <span style="margin-left:6px">${ci.talentName} · ${ci.type} · ${ci.liveHours}h</span></div><span class="ci-gmv">GMV ¥${fmt(ci.gmv||0)}</span></div>`).join('')}
      </div>`:''}
      <div style="text-align:center;padding:10px"><button class="btn btn-blue btn-sm" onclick="exportData()">📥 导出数据</button></div>
    `;return;
  }

  if(currentRole==='finance'){
    // Finance: full settlement & recovery view
    const totalGMV=store.checkins.reduce((s,c)=>s+(c.gmv||0),0);
    const overdue=store.contracts.filter(c=>c.phase<7&&new Date(c.dueDate)<new Date());
    const allPayments=store.contracts.filter(c=>c.payments&&c.payments.length).flatMap(c=>(c.payments||[]).map(p=>({...p,brand:c.brandName,contract:c.contractName,amount2:c.amount}))).sort((a,b)=>new Date(b.date)-new Date(a.date));
    mc.innerHTML=`
      <div class="alert alert-info">💰 财务工作台 · 结算与回款全貌</div>
      <div class="dash-kpis">
        <div class="dash-kpi"><div class="dk-num" style="color:var(--r)">¥${fmt(totalAmount)}</div><div class="dk-label">合同总金额</div></div>
        <div class="dash-kpi"><div class="dk-num" style="color:var(--g)">¥${fmt(totalPaid)}</div><div class="dk-label">已回款金额</div></div>
        <div class="dash-kpi"><div class="dk-num" style="color:#FF9500">¥${fmt(totalAmount-totalPaid)}</div><div class="dk-label">待收金额</div></div>
        <div class="dash-kpi"><div class="dk-num" style="color:${overdue.length?'var(--r)':'var(--g)'}">${overdue.length}</div><div class="dk-label">超期未归档</div></div>
      </div>
      <div class="dash-chart"><h4>💰 全盘回款明细</h4>
        <table class="mini-table">
          <tr><th>合同</th><th>品牌</th><th class="right">金额</th><th class="right">已回款</th><th class="right">回款率</th><th class="right">待收</th></tr>
          ${[...store.contracts].sort((a,b)=>{
            const ra=a.amount?((a.paidAmount||0)/a.amount):0;
            const rb=b.amount?((b.paidAmount||0)/b.amount):0;
            return ra-rb;
          }).map(c=>{
            const rate=c.amount?Math.round((c.paidAmount||0)/c.amount*100):0;
            const rateCls=rate>=100?'var(--g)':rate>=50?'#FF9500':'var(--r)';
            return `<tr style="cursor:pointer" onclick="openContractDetail('${c.id}')">
              <td>${c.contractName}</td><td>${c.brandName}</td>
              <td class="right" style="color:var(--r)">¥${fmt(c.amount)}</td>
              <td class="right" style="color:var(--g)">¥${fmt(c.paidAmount||0)}</td>
              <td class="right" style="color:${rateCls};font-weight:700">${rate}%</td>
              <td class="right" style="color:var(--r)">¥${fmt(c.amount-(c.paidAmount||0))}</td>
            </tr>`;
          }).join('')}
        </table>
      </div>
      ${allPayments.length?`
      <div class="dash-chart"><h4>💳 全部回款记录 (${allPayments.length}条)</h4>
        <div class="payment-list" style="max-height:400px">
          ${allPayments.map(p=>`<div class="payment-item"><div><strong>${p.brand}</strong> · ${p.contract}<br><span style="font-size:10px;color:var(--t2)">${p.date}${p.note?' · '+p.note:''}${p.recordedBy?' · 操作:'+p.recordedBy:''}</span></div><span class="pay-amount">+¥${fmt(p.amount)}</span></div>`).join('')}
        </div>
      </div>`:''}
      <div style="text-align:center;padding:10px"><button class="btn btn-blue btn-sm" onclick="exportData()">📥 导出财务数据</button></div>
    `;return;
  }

  // Director: full dashboard
  const totalFee=store.contracts.reduce((s,c)=>s+c.talents.reduce((ss,t)=>ss+(t.fee||0),0),0);
  const totalGMV=store.checkins.reduce((s,c)=>s+(c.gmv||0),0);
  const topContracts=[...store.contracts].sort((a,b)=>b.amount-a.amount).slice(0,5);
  const talentGMV={};
  store.checkins.forEach(c=>{talentGMV[c.talentName]=(talentGMV[c.talentName]||0)+(c.gmv||0)});
  const topTalents=Object.entries(talentGMV).sort((a,b)=>b[1]-a[1]).slice(0,5);

  mc.innerHTML=`
    <div class="dash-kpis">
      <div class="dash-kpi"><div class="dk-num" style="color:var(--b)">${store.contracts.length}</div><div class="dk-label">总合同数</div></div>
      <div class="dash-kpi"><div class="dk-num" style="color:var(--r)">¥${fmt(totalAmount)}</div><div class="dk-label">合同总金额</div></div>
      <div class="dash-kpi"><div class="dk-num" style="color:var(--g)">¥${fmt(totalPaid)}</div><div class="dk-label">已回款金额</div></div>
      <div class="dash-kpi"><div class="dk-num" style="color:#FF9500">¥${fmt(totalGMV)}</div><div class="dk-label">达人总GMV</div></div>
    </div>

    <div class="grid-2col">
      <div class="dash-chart">
        <h4>📊 合同阶段分布</h4>
        <div class="bar-chart">
          ${PHASES.map((p,i)=>`<div class="bar-row"><span class="bar-label">${p}</span><div class="bar-track"><div class="bar-fill" style="width:${(phaseCounts[i]/maxPhase*100)}%;background:var(--ph${i})"></div></div><span class="bar-count">${phaseCounts[i]}</span></div>`).join('')}
        </div>
      </div>
      <div class="dash-chart">
        <h4>🏆 TOP 5 达人GMV</h4>
        <div class="bar-chart">
          ${topTalents.length?topTalents.map(([n,g])=>{const maxG=topTalents[0][1]||1;return`<div class="bar-row"><span class="bar-label" style="width:70px">${n}</span><div class="bar-track"><div class="bar-fill" style="width:${(g/maxG*100)}%;background:var(--g)"></div></div><span class="bar-count" style="width:50px">¥${fmt(g)}</span></div>`}).join(''):'<div style="text-align:center;color:var(--t3)">暂无数据</div>'}
        </div>
      </div>
    </div>

    <div class="dash-chart">
      <h4>📋 合同金额 TOP 5</h4>
      <table class="mini-table">
        <tr><th>合同</th><th>品牌</th><th>阶段</th><th class="right">金额</th><th class="right">已回款</th></tr>
        ${topContracts.map(c=>`<tr><td>${c.contractName}</td><td>${c.brandName}</td><td>${phaseTag(c.phase)}</td><td class="right" style="color:var(--r)">¥${fmt(c.amount)}</td><td class="right" style="color:var(--g)">¥${fmt(c.paidAmount||0)}</td></tr>`).join('')}
      </table>
    </div>
    <div class="dash-chart" style="text-align:center;padding:12px">
      <button class="btn btn-blue" onclick="exportData()">📥 导出全部数据（JSON）</button>
      <div style="font-size:10px;color:var(--t3);margin-top:4px">合同/达人/品牌/打卡全量数据</div>
    </div>
  `;
}

// Quick confirm checkin (for assistant dashboard)
function confirmCheckin(id){
  const ci=store.checkins.find(x=>x.id===id);
  if(!ci)return;
  ci.confirmedBy=currentUser;
  saveStore(store);
  renderTab('dashboard');
  toast(`已确认 ${ci.talentName} 的打卡`);
}

// === Modal ===
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('modalBox').innerHTML='';
}

// Init
updateBadge();
</script>
</body>
</html>
